<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffb6c1,#ffd1dc);
text-align:center;
overflow:hidden;
}

#app{
max-width:400px;
margin:auto;
padding:20px;
}

.option{
background:white;
margin:10px;
padding:12px;
border-radius:20px;
cursor:pointer;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:#ff4081;
color:white;
margin-top:15px;
}

.balloon{
position:fixed;
font-size:22px;
animation:up 10s linear infinite;
}

@keyframes up{
0%{transform:translateY(120vh);}
100%{transform:translateY(-120vh);}
}

.gift{
font-size:80px;
cursor:pointer;
}

.slide{
animation:slide 0.5s;
}
@keyframes slide{
from{transform:translateX(100%);}
to{transform:translateX(0);}
}

.fade{
opacity:0;
animation:fade 1s forwards;
}
@keyframes fade{
to{opacity:1;}
}

</style>
</head>

<body>

<div class="balloon" style="left:20%">🎈</div>
<div class="balloon" style="left:70%;animation-delay:2s">🎈</div>

<div id="app"></div>

<!-- ✅ AUDIO -->
<audio id="quizMusic" src="quiz.mp3" loop></audio>
<audio id="giftMusic" src="gift.mp3" loop></audio>

<script>

/* AUDIO CONTROL */
function play(id){
let m=document.getElementById(id);
if(m){
m.play().catch(()=>{});
}
}

function stop(id){
let m=document.getElementById(id);
if(m){
m.pause();
m.currentTime=0;
}
}

/* START SCREEN */
function startScreen(){
document.getElementById("app").innerHTML=`
<h1>🎂 HANA 🎂</h1>
<p>Tap to start your adventure</p>
<button onclick="startQuiz()">Start 🎁</button>
`;
}

function startQuiz(){
play("quizMusic");
showQ();
}

/* QUIZ */

let q=0;
let answered=false;

const quiz=[

{
q:`😂 Do you remember me?<br><br>
If yes... what was the nickname I gave you?`,
o:["Sahana","Sahana silent queen","HANA","shhhhh"],
a:"😁 Correct!! It's HANA hehehee 🎉"
},

{
q:`🔴 A mysterious button appears.<br><br>What do you do?`,
o:["Press immediately 🔴","Read 📜","Ask 👀","Walk 🚶"],
a:`Too late. Birthday Dimension 🎉`
},

{
q:`🎁 Treasure chest?<br><br>What inside?`,
o:["Gold 💰","Pizza 🍕","Chocolate 🍫","Skip Monday 😴"],
a:`Just another question 😂`
},

{
q:`🎂 One wish?`,
o:["Money 💸","Food 🍔","Sleep 😴","Luck 🍀"],
a:`Wish used for her birthday ✨`
},

{
q:`🎉 Ready for surprise?`,
o:["YES","ABSOLUTELY","READY","SHOW ME"],
a:`Surprise loading 🎂✨`
}

];

function showQ(){

answered=false;

let data=quiz[q];
let html=`<h2>${data.q}</h2>`;

data.o.forEach(opt=>{
html+=`<div class="option" onclick="answer()">${opt}</div>`;
});

document.getElementById("app").innerHTML=html;
}

function answer(){
if(answered) return;
answered=true;

document.getElementById("app").innerHTML+=`
<p class="fade">${quiz[q].a}</p>
<button onclick="nextQ()">Next ➡️</button>
`;
}

function nextQ(){
q++;
if(q<quiz.length){
showQ();
}else{
startGame();
}
}

/* GIFTS */

let g=0;

const messages=[
"😂 Growing older is mandatory. Growing up is optional!",
"🎂 Birthday calories don't count today!",
"🦄 Happiness Level Unlocked!",
"🐼 Panda hugs are on the way!",
"🍕 Pizza fixes everything!",
"👑 Queen Hana activated!",
"🤣 Another year of awesomeness!",
"🎈 Smile! Today belongs to you!",
"❤️ One final surprise is waiting!"
];

function startGame(){

stop("quizMusic");
play("giftMusic");  // ✅ starts and loops forever

showGift();
}

function showGift(){

document.getElementById("app").innerHTML=`
<div class="slide">
<h2>🎁 Gift ${g+1}</h2>
<div class="gift" onclick="openGift()">🎁</div>
<p>Tap to open</p>
</div>
`;
}

function openGift(){

document.getElementById("app").innerHTML=`
<h2 class="fade">${messages[g]}</h2>
<button onclick="nextGift()">Next ➡️</button>
`;
}

function nextGift(){
g++;
if(g<messages.length){
showGift();
}else{
finalPage();
}
}

/* FINAL (MUSIC CONTINUES ✅) */

function finalPage(){

document.getElementById("app").innerHTML=`

<h1 class="fade">🎉 HAPPY BIRTHDAY HANA 🎉</h1>

<p class="fade" style="animation-delay:1s">May your day be filled with laughter...</p>
<p class="fade" style="animation-delay:2s">Happiness...</p>
<p class="fade" style="animation-delay:3s">Amazing memories...</p>
<p class="fade" style="animation-delay:4s">Lots of cake...</p>
<p class="fade" style="animation-delay:5s">And endless reasons to smile!</p>

<p class="fade" style="animation-delay:6s">😊 It's been a while...</p>
<p class="fade" style="animation-delay:7s">But I didn't want to miss...</p>
<p class="fade" style="animation-delay:8s">The chance to wish you...</p>
<p class="fade" style="animation-delay:9s">A Very Happy Birthday!</p>

`;
}

/* START */
startScreen();

</script>
</body>
</html>
