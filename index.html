<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffb6c1,#ffd1dc);
text-align:center;
overflow:hidden;
}

#app{
max-width:400px;
margin:auto;
padding:20px;
}

h2{font-size:20px;line-height:1.4;}

.option{
background:white;
margin:10px;
padding:12px;
border-radius:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4081;
color:white;
margin-top:15px;
}

/* balloon */
.balloon{
position:fixed;
font-size:22px;
animation:up 10s linear infinite;
}
@keyframes up{
0%{transform:translateY(120vh);}
100%{transform:translateY(-120vh);}
}

/* gift */
.gift{
font-size:80px;
cursor:pointer;
}

/* slide */
.slide{
animation:slideIn 0.5s;
}
@keyframes slideIn{
from{transform:translateX(100%);}
to{transform:translateX(0);}
}

/* fade */
.fade{
opacity:0;
animation:fade 1s forwards;
}
@keyframes fade{
to{opacity:1;}
}

</style>
</head>

<body>

<div class="balloon" style="left:20%">🎈</div>
<div class="balloon" style="left:70%;animation-delay:2s">🎈</div>

<div id="app"></div>

<script>

/* QUIZ */

let q=0;
let answered=false;

const quiz=[

{
q:`😂 Do you remember me?<br><br>
If yes... what was the nickname I gave you?`,
o:["Sahana","Sahana silent queen","HANA","shhhhh"],
a:"😁 Correct!! It's HANA hehehee 🎉"
},

{
q:`🔴 A mysterious button appears.<br><br>What do you do?`,
o:["Press it immediately 🔴","Read instructions 📜","Ask someone 👀","Walk away 🚶"],
a:`Too late. You pressed it.<br>Welcome to the Birthday Dimension 🎉`
},

{
q:`🎁 You find a treasure chest.<br><br>What do you hope is inside?`,
o:["Gold 💰","Unlimited pizza 🍕","Chocolates 🍫","Skip Mondays 😴"],
a:`Sorry... it was just another birthday question 😂`
},

{
q:`🎂 You can make ONE wish`,
o:["Infinite money 💸","Infinite food 🍔","Infinite naps 😴","Infinite luck 🍀"],
a:`Nice choice!<br>But today's wish was already used...<br>to make this birthday unforgettable ✨`
},

{
q:`🎉 You've made it this far.<br><br>Are you ready for the surprise?`,
o:["YES!","ABSOLUTELY!","I’VE BEEN READY!","JUST SHOW ME!"],
a:`Correct.<br>The birthday surprise is loading... 🎂✨`
}

];

function showQ(){

answered=false;

let data=quiz[q];

let html=`<h2>${data.q}</h2>`;

data.o.forEach(opt=>{
html+=`<div class="option" onclick="answer()">${opt}</div>`;
});

document.getElementById("app").innerHTML=html;
}

function answer(){

if(answered) return;
answered=true;

document.getElementById("app").innerHTML+=`
<p class="fade">${quiz[q].a}</p>
<button onclick="nextQ()">Next ➡️</button>
`;
}

function nextQ(){
q++;
if(q<quiz.length) showQ();
else startGame();
}

/* GIFTS */

let g=0;

const messages=[
"😂 Growing older is mandatory. Growing up is optional!",
"🎂 Birthday calories don't count today!",
"🦄 Happiness Level Unlocked!",
"🐼 Panda hugs are on the way!",
"🍕 Pizza fixes everything!",
"👑 Queen Hana activated!",
"🤣 Another year of awesomeness!",
"🎈 Smile! Today belongs to you!",
"❤️ One final surprise is waiting!"
];

function startGame(){
showGift();
}

function showGift(){

document.getElementById("app").innerHTML=`
<div class="slide">
<h2>🎁 Gift ${g+1}</h2>
<div class="gift" onclick="openGift()">🎁</div>
<p>Tap to open</p>
</div>
`;
}

function openGift(){

document.getElementById("app").innerHTML=`
<h2 class="fade">${messages[g]}</h2>
<button onclick="nextGift()">Next ➡️</button>
`;
}

function nextGift(){
g++;
if(g<messages.length){
showGift();
}else{
finalPage();
}
}

/* FINAL */

function finalPage(){

document.getElementById("app").innerHTML=`

<h1 class="fade">🎉 HAPPY BIRTHDAY HANA 🎉</h1>

<p class="fade" style="animation-delay:1s">May your day be filled with laughter...</p>
<p class="fade" style="animation-delay:2s">Happiness...</p>
<p class="fade" style="animation-delay:3s">Amazing memories...</p>
<p class="fade" style="animation-delay:4s">Lots of cake...</p>
<p class="fade" style="animation-delay:5s">And endless reasons to smile!</p>

<p class="fade" style="animation-delay:6s">😊 It's been a while...</p>
<p class="fade" style="animation-delay:7s">But I didn't want to miss...</p>
<p class="fade" style="animation-delay:8s">The chance to wish you...</p>
<p class="fade" style="animation-delay:9s">A Very Happy Birthday!</p>

`;
}

/* START */
showQ();

</script>

</body>
</html>
